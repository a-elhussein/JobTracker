services:
  postgres:
    image: postgres:16
    container_name: jobtracker-postgres
    restart: always
    environment:
      POSTGRES_DB: jobtrackerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - jobtracker-postgres-data:/var/lib/postgresql/data

volumes:
  jobtracker-postgres-data: